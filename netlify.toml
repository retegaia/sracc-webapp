[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Le route del modulo AI (§3.1 Tab.2) hanno un segmento in più
# (/api/ai/classify, /api/ai/overlaps) rispetto al nome piatto della
# Function (ai-classify.js, ai-overlaps.js): serve un redirect esplicito per
# ciascuna, prima della regola generica sotto, altrimenti lo splat
# "ai/classify" non trova alcuna function chiamata così e Netlify risponde
# 404 "Function not found".
[[redirects]]
  from = "/api/ai/classify"
  to = "/.netlify/functions/ai-classify"
  status = 200

[[redirects]]
  from = "/api/ai/overlaps"
  to = "/.netlify/functions/ai-overlaps"
  status = 200

# Stesso motivo delle due regole sopra: /api/contributions/validate (S10,
# §10 v4) ha un segmento in più rispetto al nome della Function
# (contributions-validate.js).
[[redirects]]
  from = "/api/contributions/validate"
  to = "/.netlify/functions/contributions-validate"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Fallback SPA: tutte le route non-API servono index.html, così React Router
# gestisce /login, /form, /coordinator ecc. lato client (§4.1). Deve restare
# l'ultima regola.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
